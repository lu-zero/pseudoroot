name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, "1.92"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      # pseudoroot-lib is a cdylib with no Cargo dependents (pseudoroot-tests
      # finds it at runtime by scanning target/{debug,release}, not via a
      # `[dependencies]` edge) and its own unit tests are disabled, so
      # `cargo test --workspace` alone never builds it. Build the workspace
      # explicitly first, as AGENTS.md's documented dev flow does. Note:
      # `pseudoroot`'s build.rs (which embeds pseudoroot-lib's cdylib into
      # the `pdr` binary) builds pseudoroot-lib too, but into an isolated
      # OUT_DIR-scoped target-dir, not target/{debug,release} — it doesn't
      # satisfy pseudoroot-tests's scan, so this step is still required.
      - run: cargo build --workspace
      - run: cargo test --workspace

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # See the comment on the `test` job.
      - run: cargo build --workspace
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      # See the comment on the `test` job: pseudoroot-lib's cdylib artifact
      # needs an explicit build under target/{debug,release} (llvm-cov's own
      # --target-dir override for the instrumented test binaries doesn't
      # help here, nor does pseudoroot's build.rs embed step — both build
      # pseudoroot-lib into a different tree than what the test harness scans).
      - run: cargo build -p pseudoroot-lib
      - run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --workspace --no-deps
